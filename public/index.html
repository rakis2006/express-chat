<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <style>
      .chat { display: flex; flex-direction: column; height: 100vh; }
      .messages { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
      .form { display: flex; }
      .input { flex: 1; padding: 10px; border: 1px solid #ccc; }
      .submit { padding: 10px; border: 1px solid #ccc; background: #eee; cursor: pointer; }
      .system { color: gray; font-style: italic; }
    </style>
  </head>
  <body>
    <div class="chat">
      <ul class="messages"></ul>
      <form class="form">
        <input class="input" autocomplete="off" />
        <button class="submit">Send</button>
      </form>
    </div>
    <script>
      function main() {
        const host = location.origin.replace(/^http/, 'ws')
        const ws = new WebSocket(host + '/ws')
        const myId = self.crypto.randomUUID().substr(0, 8)

        // ユーザー名を決める（空ならIDを使う）
        let myName = prompt('名前を入力してください', '名無しさん')
        if (!myName) myName = myId

        const form = document.querySelector('.form')
        const messageList = document.querySelector('.messages')

        // 接続時に入室メッセージを送る
        ws.onopen = function () {
          ws.send(JSON.stringify({
            type: 'system',
            text: `${myName} さんが入室しました`,
            id: myId
          }))
        }

        form.onsubmit = function (e) {
          e.preventDefault()
          const input = document.querySelector('.input')
          const text = input.value
          ws.send(JSON.stringify({
            type: 'chat',
            id: myId,
            name: myName,
            text,
            time: new Date().toLocaleTimeString('ja-JP')
          }))
          input.value = ''
          input.focus()
        }

        ws.onmessage = function (msg) {
          const data = JSON.parse(msg.data)
          const li = document.createElement('li')

          if (data.type === 'system') {
            li.textContent = data.text
            li.className = 'system'
          } else {
            const { id, name, text, time } = data
            if (id === myId) {
              li.textContent = `[${time}] (自分)${name}: ` + text
            } else {
              li.textContent = `[${time}] ${name}: ` + text
            }
          }
          messageList.appendChild(li)
        }

        ws.onerror = function (error) {
          console.error('WebSocket Error: ', error)
        }
      }
      main()
    </script>
  </body>
</html>
